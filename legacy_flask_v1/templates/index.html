<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobCheq - Fake Job Offer Detector</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/css/style.css">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="glass-container">
        <header>
            <div class="logo">
                <i class="fa-solid fa-shield-halved"></i> JobCheq
            </div>
            <nav>
                <a href="#">Home</a>
                <a href="#about">About</a>
                <a href="#contact">Contact</a>
            </nav>
        </header>

        <main>
            <div class="hero-text">
                <h1>Verify Your Offer. <br>Securing Your Future.</h1>
                <p>Detect fake job offers instantly with our advanced AI & Scam Pattern Analysis.</p>
            </div>

            <div class="analyzer-box">
                <div class="input-group">
                    <label for="job-input">Paste Job Description or Offer Email</label>
                    <textarea id="job-input" placeholder="e.g. 'Urgent hiring! Pay 500rs registration fee...'"></textarea>
                </div>
                <button id="analyze-btn">
                    <span id="btn-text">Analyze Offer</span>
                    <div id="loading-spinner" class="spinner hidden"></div>
                </button>
            </div>

            <div id="result-container" class="result-box hidden">
                <div class="result-header">
                    <h2 id="result-title">Analysis Result</h2>
                    <div id="result-badge" class="badge">Safe</div>
                </div>
                <div class="result-details">
                    <div class="score-circle">
                        <svg viewBox="0 0 36 36" class="circular-chart orange">
                            <path class="circle-bg"
                                d="M18 2.0845
                                a 15.9155 15.9155 0 0 1 0 31.831
                                a 15.9155 15.9155 0 0 1 0 -31.831"
                            />
                            <path class="circle"
                                stroke-dasharray="0, 100"
                                d="M18 2.0845
                                a 15.9155 15.9155 0 0 1 0 31.831
                                a 15.9155 15.9155 0 0 1 0 -31.831"
                            />
                            <text x="18" y="20.35" class="percentage">0%</text>
                        </svg>
                        <p>Confidence</p>
                    </div>
                    <div class="info-text">
                        <p id="prediction-text">Prediction: <strong>Unknown</strong></p>
                        <ul id="flags-list">
                            <!-- Flags go here -->
                        </ul>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 JobCheqAI. Optimized for privacy and performance.</p>
        </footer>
    </div>

    <script src="../static/js/main.js"></script>
</body>
</html>
